   <g id="text_1">
    <text style="font-size: 8.4px; font-family: 'DejaVu Sans'; text-anchor: middle" x="108.8025" y="108.351687" transform="rotate(-0 108.8025 108.351687)">– therapeutic directionality</text>
   </g>
   <g id="text_2">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="234.46875" y="102.53074" transform="rotate(-0 234.46875 102.53074)">a real, reproducible cellular hit with no disease reversal</text>
   </g>
   <g id="text_3">
    <text style="font-size: 7.2px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #333333" x="234.46875" y="118.591122" transform="rotate(-0 234.46875 118.591122)">e.g. PAK2 — PAK2 passes every technical gate; without the directionality gate it would read as advanceable</text>
   </g>
   <g id="text_4">
    <text style="font-size: 8.4px; font-family: 'DejaVu Sans'; text-anchor: middle" x="108.8025" y="156.399687" transform="rotate(-0 108.8025 156.399687)">– broad effect and essentiality controls</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="234.46875" y="150.546709" transform="rotate(-0 234.46875 150.546709)">broad chromatin / RNA / essential-machinery reversers</text>
   </g>
   <g id="text_6">
    <text style="font-size: 7.2px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #333333" x="234.46875" y="166.639122" transform="rotate(-0 234.46875 166.639122)">e.g. GNAS,STAT3,SMARCB1,TET2 — high reversal driven by nonspecific broad suppression, not disease-specific biology</text>
   </g>
   <g id="text_7">
    <text style="font-size: 8.4px; font-family: 'DejaVu Sans'; text-anchor: middle" x="108.8025" y="204.447687" transform="rotate(-0 108.8025 204.447687)">– modality review</text>
   </g>
   <g id="text_8">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="234.46875" y="198.594709" transform="rotate(-0 234.46875 198.594709)">immune-directional but undruggable transcription factors</text>
   </g>
   <g id="text_9">
    <text style="font-size: 7.2px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #333333" x="234.46875" y="214.687122" transform="rotate(-0 234.46875 214.687122)">e.g. KLF13,IRF9,ELF4 — real immune-directional reversal + immune genetics, but no credible small-molecule modality</text>
   </g>
   <g id="text_10">
    <text style="font-size: 8.4px; font-family: 'DejaVu Sans'; text-anchor: middle" x="108.8025" y="252.495687" transform="rotate(-0 108.8025 252.495687)">– finite null uncertainty reporting</text>
   </g>
   <g id="text_11">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="234.46875" y="246.642709" transform="rotate(-0 234.46875 246.642709)">RICTOR matched-null significance read as decisive</text>
   </g>
   <g id="text_12">
    <text style="font-size: 7.2px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #333333" x="234.46875" y="262.735122" transform="rotate(-0 234.46875 262.735122)">e.g. RICTOR — point estimate p=0.040 looks firm, but the Wilson/bootstrap CI on 7/200 grazes 0.05-0.07</text>
   </g>
   <g id="text_13">
    <text style="font-size: 8.4px; font-family: 'DejaVu Sans'; text-anchor: middle" x="108.8025" y="300.543687" transform="rotate(-0 108.8025 300.543687)">– confound decomposition</text>
   </g>
   <g id="text_14">
    <text style="font-weight: 700; font-size: 8.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="234.46875" y="294.690709" transform="rotate(-0 234.46875 294.690709)">reversal mistaken for generic activation / broad suppression</text>
   </g>
   <g id="text_15">
    <text style="font-size: 7.2px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #333333" x="234.46875" y="310.783122" transform="rotate(-0 234.46875 310.783122)">e.g. RICTOR — without module-removal, a reversal could be dismissed as (or inflated by) nonspecific suppression</text>
   </g>
   <g id="text_16">
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'" transform="translate(7.2 15.558281)">Supplementary — process ablation: what would survive if one gate were removed</text>
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'" transform="translate(7.2 27.961812)">(frozen decisions only; no threshold changes; not a causal-importance claim)</text>
   </g>
  </g>
 </g>
