   </g>
   <g id="text_3">
    <text style="font-size: 9.2px; font-family: 'DejaVu Sans'" transform="translate(60.154938 225.336481)">21 biologically robust</text>
    <text style="font-size: 9.2px; font-family: 'DejaVu Sans'" transform="translate(43.333313 235.638469)">(187 broad / donor-unstable)</text>
   </g>
   <g id="text_4">
    <text style="font-size: 9.2px; font-family: 'DejaVu Sans'" transform="translate(75.707969 302.176321)">0 advanceable</text>
    <text style="font-size: 9.2px; font-family: 'DejaVu Sans'" transform="translate(34.829063 312.478309)">21 safety / modality constrained</text>
   </g>
   <g id="text_5">
