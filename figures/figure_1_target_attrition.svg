   </g>
   <g id="text_12">
    <text style="font-size: 9.2px; font-family: 'DejaVu Sans'" transform="translate(468.438875 254.946367)">COMPARATOR ONLY</text>
    <text style="font-size: 9.2px; font-family: 'DejaVu Sans'" transform="translate(451.462 265.248355)">not directionally supported</text>
    <text style="font-size: 9.2px; font-family: 'DejaVu Sans'" transform="translate(479.450844 275.550342)">in this analysis</text>
   </g>
   <g id="text_13">
    <text style="font-style: italic; font-size: 9px; font-family: 'DejaVu Sans'; text-anchor: start" x="314.1" y="339.54957" transform="rotate(-0 314.1 339.54957)">Ranking is not validation: a real perturbation effect is necessary but not sufficient for target nomination.</text>
