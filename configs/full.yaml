# Level 3 — Full open-data reproduction.
# Downloads/reads only verified public data, verifies checksums, reconstructs the
# disease vector and effect-vector substrate, and regenerates the complete public
# outputs. Server-scale; may take hours.
level: 3
name: full
description: >-
  Reconstruct the analysis from the open primary data: the JIA synovial atlas
  (CZ CELLxGENE) and the primary human CD4+ T-cell Perturb-seq release (CZI VCP /
  GEO). Rebuild the donor-paired disease vector, the genome-scale effect vectors,
  the functional table, and rerun scoring, robustness, null calibration and
  figures.
open_data:
  perturbseq:
    title: Primary Human CD4+ T Cell Perturb-seq
    doi: 10.64898/2025.12.23.696273
    processed_s3: s3://genome-scale-tcell-perturb-seq/marson2025_data/
    geo: GSE314342
    sra: SRP643211
    license: MIT
  jia_disease:
    title: JIA synovial single-cell atlas (Integrated global cells)
    doi: 10.64898/2026.05.01.716870
    cellxgene_collection: 10eb236d-d42d-45b8-8363-c2dcf865f388
    h5ad_url: https://datasets.cellxgene.cziscience.com/f758894c-14bc-4bfe-94dd-16dd9945f7d3.h5ad
    license: CC-BY-4.0
env:
  # Configure these to your compute environment; no hardcoded internal paths.
  SERVER_DATA_ROOT: path to the genome-scale effect-vector substrate + functional table
  SERVER_RESULTS_ROOT: path to write reconstructed results
stages_that_are_server_scale:
  - build disease vector from the JIA h5ad (raw-count donor-paired pseudobulk)
  - build genome-scale effect vectors (KD-vs-NTC log2FC per perturbation per condition)
  - matched-perturbation null over all perturbations
seed: 0
resources:
  ram_gb: 128
  cpu_cores: 16
  storage_gb: 60
  runtime_hours: "several"
  server_required: true
blocked_reproduction_note: >-
  If a required processed input cannot be rebuilt from a public source under its
  license, that limitation is stated prominently and Levels 1-2 remain the honest
  reproducibility guarantee. See docs/REPRODUCIBILITY_LEVELS.md.
