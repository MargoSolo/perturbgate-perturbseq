name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Broad Python matrix on Linux; a single supported version on macOS
        # (macos-latest is Apple Silicon / arm64) to prove cross-platform support
        # while controlling CI time.
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - os: macos-latest
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (editable + dev)
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: python -m ruff check src scripts tests

      - name: Unit tests + schema validation
        run: python -m pytest -q

      - name: Demo (Level 1, no server data)
        run: python -m perturbgate.cli demo

      - name: Analytical reproduction (Level 2, public derived matrices)
        run: python -m perturbgate.cli reproduce

      - name: Verify (schemas, golden values, claims, funnel, superseded guard)
        run: python -m perturbgate.cli verify

      - name: Results manifest
        run: python -m perturbgate.cli manifest

      - name: Public-readiness / privacy audit
        run: python scripts/public_readiness_audit.py

      - name: Cross-platform byte-stability of text artifacts (LF + content)
        # PNG/SVG rasterization is platform-dependent (font hinting) and is not
        # asserted byte-identical; the frozen tables and figure source data are
        # numeric/text and must regenerate identically on every OS.
        run: |
          python -m perturbgate.cli figures
          python -m perturbgate.cli manifest
          changed="$(git status --porcelain results/frozen figures/source_data)"
          if [ -n "$changed" ]; then
            echo "text artifacts changed on ${{ matrix.os }}:"; echo "$changed"
            git --no-pager diff -- results/frozen figures/source_data
            exit 1
          fi
          echo "text artifacts are byte-stable on ${{ matrix.os }}"
